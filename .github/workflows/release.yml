name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make app

      - name: Zip
        run: |
          cd TrayPulsy.app/..
          zip -r TrayPulsy-${{ github.ref_name }}.zip TrayPulsy.app

      - name: Generate checksum
        id: checksum
        run: |
          SHA=$(shasum -a 256 TrayPulsy-${{ github.ref_name }}.zip | cut -d ' ' -f 1)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: TrayPulsy-${{ github.ref_name }}.zip
          generate_release_notes: true

      - name: Update Homebrew Tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          SHA256: ${{ steps.checksum.outputs.sha }}
        run: |
          VER="${VERSION#v}"
          cat > tray-pulsy.rb <<'CASK'
          cask "tray-pulsy" do
            version "_VER_"
            sha256 "_SHA_"

            url "https://github.com/krissss/tray-pulsy/releases/download/_TAG_/TrayPulsy-_TAG_.zip"
            name "TrayPulsy"
            desc "Lightweight macOS menu bar app with animated system monitor"
            homepage "https://github.com/krissss/tray-pulsy"

            depends_on macos: ">= :sequoia"

            app "TrayPulsy.app"

            zap delete: [
              "~/Library/Preferences/com.traypulsy.app.plist",
            ]
          end
          CASK
          sed -i '' "s/_VER_/${VER}/g; s/_SHA_/${SHA256}/g; s/_TAG_/${VERSION}/g" tray-pulsy.rb
          ENCODED=$(base64 < tray-pulsy.rb | tr -d '\n')
          FILE_SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/krissss/homebrew-tap/contents/Casks/tray-pulsy.rb" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || true)
          ARGS=(-X PUT "https://api.github.com/repos/krissss/homebrew-tap/contents/Casks/tray-pulsy.rb"
            -H "Authorization: token $GH_TOKEN"
            -H "Accept: application/vnd.github+json"
            -d "{\"message\":\"Update tray-pulsy to ${VER}\",\"content\":\"${ENCODED}\"")
          if [ -n "$FILE_SHA" ]; then
            ARGS+=(-d "{\"message\":\"Update tray-pulsy to ${VER}\",\"content\":\"${ENCODED}\",\"sha\":\"${FILE_SHA}\"}")
          fi
          curl -s "${ARGS[@]}" || echo "Tap update skipped"
