name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: make app

      - name: Package ZIP
        run: zip -r TrayPulsy-${{ github.ref_name }}.zip TrayPulsy.app

      - name: Sign update with Sparkle
        id: sparkle_sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Sign the zip — pipe private key via stdin, no Keychain needed
          SIGNATURE=$(echo -n "$SPARKLE_PRIVATE_KEY" | .build/artifacts/sparkle/Sparkle/bin/sign_update TrayPulsy-${{ github.ref_name }}.zip --ed-key-file - 2>&1)
          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"

          # Get file size
          SIZE=$(stat -f%z TrayPulsy-${{ github.ref_name }}.zip)
          echo "length=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Write notes to file to avoid shell interpolation issues
          gh api -X POST /repos/${{ github.repository }}/releases/generate-notes -f tag_name="${{ github.ref_name }}" --jq '.body' > /tmp/release_notes.md

      - name: Update appcast.xml
        run: |
          VER="${{ github.ref_name }}"
          VERSION_NUM="${VER#v}"
          SIGNATURE="${{ steps.sparkle_sign.outputs.signature }}"
          LENGTH="${{ steps.sparkle_sign.outputs.length }}"
          DATE=$(date -R)

          # Extract sparkle:edSignature from sign_update output (format: "sparkle:edSignature=<sig> length=<len>")
          ED_SIG=$(echo "$SIGNATURE" | sed -n 's/.*sparkle:edSignature=\([^ ]*\).*/\1/p')

          # Build new appcast item — Python handles XML safely
          python3 -c "
          import re, html
          ver = '$VER'
          ver_num = '$VERSION_NUM'
          ed_sig = '$ED_SIG'
          length = '$LENGTH'
          date_str = '$DATE'

          with open('/tmp/release_notes.md') as f:
              notes = f.read().strip()

          # Escape CDATA terminator inside notes
          notes_safe = notes.replace(']]>', ']]]]><![CDATA[>')

          item = f'''              <item>
                  <title>TrayPulsy {ver_num}</title>
                  <sparkle:version>{ver_num}</sparkle:version>
                  <sparkle:shortVersionString>{ver_num}</sparkle:shortVersionString>
                  <sparkle:minimumSystemVersion>26.0</sparkle:minimumSystemVersion>
                  <pubDate>{date_str}</pubDate>
                  <description><![CDATA[{notes_safe}]]></description>
                  <enclosure
                      url=\"https://github.com/krissss/tray-pulsy/releases/download/{ver}/TrayPulsy-{ver}.zip\"
                      sparkle:edSignature=\"{ed_sig}\"
                      length=\"{length}\"
                      type=\"application/octet-stream\"
                  />
              </item>'''

          with open('docs/appcast.xml', 'r') as f:
              content = f.read()
          content = re.sub(r'<!--.*?-->', '', content, flags=re.DOTALL)
          content = content.replace('</channel>', item + '\n    </channel>')
          content = re.sub(r'\n{3,}', '\n\n', content)
          with open('docs/appcast.xml', 'w') as f:
              f.write(content)
          "

      - name: Commit updated appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save modified appcast before switching branches
          cp docs/appcast.xml /tmp/appcast_new.xml
          # Switch from detached HEAD (at tag) to main branch
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/appcast_new.xml docs/appcast.xml
          git add docs/appcast.xml
          git diff --cached --quiet || git commit -m "chore: update appcast.xml for ${{ github.ref_name }}"
          git push origin main

      - name: Package DMG
        run: |
          DMG=TrayPulsy-${{ github.ref_name }}.dmg
          DMG_STAGING=TrayPulsy-dmg-staging
          mkdir -p "$DMG_STAGING"
          cp -r TrayPulsy.app "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create -volname "TrayPulsy" -srcfolder "$DMG_STAGING" -ov -format UDZO "$DMG"
          rm -rf "$DMG_STAGING"

      - name: Generate checksums
        id: checksum
        run: |
          ZIP_SHA=$(shasum -a 256 TrayPulsy-${{ github.ref_name }}.zip | cut -d ' ' -f 1)
          DMG_SHA=$(shasum -a 256 TrayPulsy-${{ github.ref_name }}.dmg | cut -d ' ' -f 1)
          echo "zip_sha=$ZIP_SHA" >> "$GITHUB_OUTPUT"
          echo "dmg_sha=$DMG_SHA" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: |
            TrayPulsy-${{ github.ref_name }}.zip
            TrayPulsy-${{ github.ref_name }}.dmg

      - name: Update Homebrew Tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          SHA256: ${{ steps.checksum.outputs.dmg_sha }}
        run: |
          VER="${VERSION#v}"
          cat > tray-pulsy.rb <<'CASK'
          cask "tray-pulsy" do
            version "_VER_"
            sha256 "_SHA_"

            url "https://github.com/krissss/tray-pulsy/releases/download/_TAG_/TrayPulsy-_TAG_.dmg"
            name "TrayPulsy"
            desc "Lightweight macOS menu bar app with animated system monitor"
            homepage "https://github.com/krissss/tray-pulsy"

            depends_on macos: ">= :tahoe"

            app "TrayPulsy.app"

            zap delete: [
              "~/Library/Preferences/com.traypulsy.app.plist",
            ]
          end
          CASK
          sed -i '' "s/_VER_/${VER}/g; s/_SHA_/${SHA256}/g; s/_TAG_/${VERSION}/g" tray-pulsy.rb
          ENCODED=$(base64 < tray-pulsy.rb | tr -d '\n')
          FILE_SHA=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/krissss/homebrew-tap/contents/Casks/tray-pulsy.rb" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          BODY="{\"message\":\"Update tray-pulsy to ${VER}\",\"content\":\"${ENCODED}\"}"
          if [ -n "$FILE_SHA" ]; then
            BODY="{\"message\":\"Update tray-pulsy to ${VER}\",\"content\":\"${ENCODED}\",\"sha\":\"${FILE_SHA}\"}"
          fi
          curl -sf -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/krissss/homebrew-tap/contents/Casks/tray-pulsy.rb" \
            -d "$BODY" || echo "Tap update skipped"
