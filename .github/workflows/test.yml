name: Test

on:
  workflow_call:

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'TrayPulsy.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Use checked-in package resolution
        run: cp TrayPulsy.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved Package.resolved

      - name: Run tests
        run: swift test
